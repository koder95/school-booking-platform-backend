databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: Koder95
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email_id
                  type: bigint
                  constraints:
                    unique: true
                    nullable: false
                    foreignKeyName: fk_users_email_id
                    references: emails(id)
              - column:
                  name: password_hash
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: authority
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
