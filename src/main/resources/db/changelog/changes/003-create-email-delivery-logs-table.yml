databaseChangeLog:
  - changeSet:
      id: 003-create-email-delivery-logs-table
      author: Koder95
      changes:
        - createTable:
            tableName: email_delivery_logs
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: recipient_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_email_delivery_logs_recipient_id
                    references: emails(id)
              - column:
                  name: subject
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: body
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: text
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
