databaseChangeLog:
  - changeSet:
      id: 005-create-teachers-table
      author: Koder95
      changes:
        - createTable:
            tableName: teachers
            columns:
              - column:
                  name: uuid
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(32)
              - column:
                  name: last_name
                  type: varchar(32)
              - column:
                  name: email_id
                  type: bigint
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_teachers_email_id
                    references: emails(id)
              - column:
                  name: zone_id
                  type: varchar(64)
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
