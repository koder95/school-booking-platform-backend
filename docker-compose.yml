services:
  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "8025" ]
      interval: 5s
      timeout: 3s
      retries: 30
  postgresdb:
    image: postgres
    restart: unless-stopped
    env_file: ./.env
    ports:
      - "$DB_PORT:5432"
    environment:
      POSTGRES_DB: $DB_NAME
      POSTGRES_USER: $DB_USER
      POSTGRES_PASSWORD: $DB_PASS
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DB_USER -d $DB_NAME -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 30
  app:
    depends_on:
      mailhog:
        condition: service_healthy
      postgresdb:
        condition: service_healthy
    restart: on-failure
    image: sbp-backend
    build:
      context: .
      no_cache: true
    env_file: ./.env
    ports:
      - "8082:8080"
      - "54343:54342"
