services:
  postgresdb:
    image: postgres
    restart: unless-stopped
    env_file: ./.env
    ports:
      - "$DB_PORT:5432"
    environment:
      POSTGRES_DB: $DB_NAME
      POSTGRES_USER: $DB_USER
      POSTGRES_PASSWORD: $DB_PASS
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DB_USER -d $DB_NAME -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 30
  app:
    depends_on:
      postgresdb:
        condition: service_healthy
    restart: on-failure
    image: sbp-backend
    build: .
    env_file: ./.env
    ports:
      - "8082:8080"
      - "54343:54342"
